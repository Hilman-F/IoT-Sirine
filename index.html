<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <title>ESP32 Sirine Control</title>
</head>

<body class="bg-slate-900 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-6 space-y-6">

        <div class="space-y-2">
            <h1 class="text-3xl font-bold">ESP32 Sirine Dashboard</h1>
            <div id="currentTime" class="text-yellow-400"></div>
        </div>

    <!-- STATUS -->
        <div class="grid md:grid-cols-4 gap-4">
            <div class="card">
                <p class="label">ESP32 Status</p>
                <p id="espStatus" class="value text-yellow-400">Checking...</p>
            </div>

            <div class="card">
                <p class="label">SSID</p>
                <div class="flex justify-between">
                    <p id="SSID" class="value text-green-400"></p>
            
                    <!-- Signal Icon -->
                    <div id="signal" class="flex items-end space-x-1 h-6">
                        <div class="bar w-1 bg-gray-400"></div>
                        <div class="bar w-1 bg-gray-400"></div>
                        <div class="bar w-1 bg-gray-400"></div>
                        <div class="bar w-1 bg-gray-400"></div>
                    </div>
                </div>
            </div>

            <div id="relayManual" class="card">
                <p class="label">Relay Manual</p>
                <p id="relayStatus" class="value"></p>
            </div>

            <!-- <div id="relayAuto" class="card">
                <p class="label">Relay Otomatis</p>
                <p id="relayAutoStatus" class="value"></p>
            </div> -->

            <div id="durasiSirine" class="card">
                <p class="label">Durasi Sirine (Detik)</p>
                <input type="number" id="durasiNow" class="input">
            </div>

            <div class="card">
                <p class="label">Mode</p>

                <select id="modeSelect" class="input">
                    <option value="Auto">Auto</option>
                    <option value="Manual">Manual</option>
                </select>
            </div>
        </div>

        <!-- Last Update Time and NEXT SIRENE -->
        <div id="autoTimer" class="grid md:grid-cols-2 gap-4">
            <div class="card">
                <p class="label">Last Update Time</p>
                <p id="updateTime" class="value"></p>
            </div>
            
            <div class="card">
                <p class="label">Next Sirene</p>
                <div class="flex justify-between">
                    <p id="nextEvent" class="font-bold text-xl text-blue-400"></p>
                    <p id="countdown" class="text-base text-yellow-400"></p>
                </div>
            </div>
        </div>

        <!-- CONTROL -->

        <div id="manualControl" class="card">
            <h2 class="text-lg mb-4">Manual Control</h2>
            
            <div class="flex gap-4">
                <button id="btnOn" class="btn bg-green-600">ON</button>
                <button id="btnOff" class="btn bg-red-600">OFF</button>
            </div>
        </div>

        <a href="schedule.html" class="btn bg-blue-600 text-center block">
            Pengaturan Jadwal
        </a>

        <!-- <a href="logs.html" class="btn bg-blue-600 text-center block">
            Log Sirine
        </a> -->
    </div>

    <script type="module" src="dashboard.js"></script>
</body>

</html>
